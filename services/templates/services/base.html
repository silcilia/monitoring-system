{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring System</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'services/css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-header">
        <div class="logo-icon">
            <i class="fas fa-chart-line"></i>
        </div>
        <h2>Monitoring<span>System</span></h2>
    </div>

    <ul class="nav-menu">
        <li class="active">
            <a href="/" style="color:inherit; text-decoration:none;">
                <i class="fas fa-tachometer-alt"></i>
                <span>Dashboard</span>
            </a>
        </li>

        <li>
            <a href="/services/" style="color:inherit; text-decoration:none;">
                <i class="fas fa-server"></i>
                <span>Services</span>
            </a>
        </li>

        <li>
            <a href="/contacts/" style="color:inherit; text-decoration:none;">
                <i class="fas fa-address-book"></i>
                <span>Contacts</span>
            </a>
        </li>

        <li>
            <a href="/power/" style="color:inherit; text-decoration:none;">
                <i class="fas fa-bolt"></i>
                <span>Power</span>
            </a>
        </li>
    </ul>

    <div class="sidebar-footer">
        <div class="user-info">
            <i class="fas fa-user-circle"></i>
            <span>Admin User</span>
        </div>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="main">
    <div id="content">
        {% block content %}
        {% endblock %}
    </div>
</div>

<!-- JS -->
<script src="{% static 'services/js/app.js' %}"></script>

</body>
</html>
