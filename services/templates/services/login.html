<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Monitoring System</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.6rem;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .btn-login {
            width: 100%;
            padding: 0.7rem;
            background: #4361ee;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-login:disabled {
            background: #999;
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2><i class="fas fa-lock"></i> Login</h2>

    <div class="input-group">
        <input type="text" id="username" placeholder="Username">
    </div>

    <div class="input-group">
        <input type="password" id="password" placeholder="Password">
    </div>

    <button class="btn-login" id="loginBtn" onclick="login()">Login</button>

    <div class="error" id="errorMsg"></div>
</div>

<script>

// 🔥 Ambil CSRF token dari cookie
function getCSRFToken() {
    const name = 'csrftoken';
    const cookies = document.cookie.split(';');

    for (let cookie of cookies) {
        cookie = cookie.trim();
        if (cookie.startsWith(name + '=')) {
            return cookie.substring(name.length + 1);
        }
    }
    return '';
}

function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const btn = document.getElementById('loginBtn');

    if (!username || !password) {
        return showError("Username & Password wajib diisi");
    }

    btn.disabled = true;
    hideError();

    fetch('/api/login/', {
        method: 'POST',
        credentials: 'include',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ username, password })
    })
    .then(async res => {
        const data = await res.json();

        if (!res.ok) {
            throw new Error(data.error || "Login gagal");
        }

        return data;
    })
    .then(() => {
        // ❌ HAPUS TOKEN (tidak pakai JWT lagi)
        // localStorage.removeItem('access');

        // ✅ langsung redirect (session sudah tersimpan di cookie)
        window.location.href = '/dashboard/';
    })
    .catch(err => {
        showError(err.message);
    })
    .finally(() => {
        btn.disabled = false;
    });
}

function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.innerText = msg;
    el.style.display = 'block';
}

function hideError() {
    document.getElementById('errorMsg').style.display = 'none';
}

// ENTER KEY
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        login();
    }
});
</script>

</body>
</html>
