{% extends 'services/base.html' %}

{% block content %}
<div class="page-header">
    <h2><i class="fas fa-bolt"></i> Tambah Data Listrik</h2>
    <p>Input data voltage, current, dan power</p>
</div>

<div class="form-container">
    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>Voltage (V)</label>
            <input type="number" step="0.01" name="voltage" required>
        </div>

        <div class="form-group">
            <label>Current (A)</label>
            <input type="number" step="0.01" name="current" required>
        </div>

        <div class="form-group">
            <label>Power (W)</label>
            <input type="number" step="0.01" name="power" required>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">
                <i class="fas fa-save"></i> Simpan
            </button>
            <a href="/power/" class="btn-secondary">Batal</a>
        </div>
    </form>
</div>
{% endblock %}
