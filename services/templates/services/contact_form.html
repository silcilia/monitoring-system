{% extends 'services/base.html' %}

{% block content %}
<h2>Tambah Contact</h2>

<div class="card">
  <form method="post">
    {% csrf_token %}

    <label>Nama</label><br>
    <input type="text" name="name" required><br><br>

    <label>Nomor WhatsApp</label><br>
    <input type="text" name="phone_number" placeholder="628xxxxxxxxxx" required><br><br>

    <button type="submit">Simpan</button>
  </form>
</div>
{% endblock %}
