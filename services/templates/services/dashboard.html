{% extends 'services/base.html' %}

{% block content %}
<div class="page-header">
    <h2><i class="fas fa-chart-line"></i> Dashboard Monitoring</h2>
    <p>Ringkasan status semua service</p>
</div>

<!-- STAT CARD -->
<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-server"></i></div>
        <div class="stat-info">
            <h3>Total</h3>
            <div class="stat-number">{{ total }}</div>
        </div>
    </div>

    <div class="stat-card success">
        <div class="stat-icon"><i class="fas fa-check"></i></div>
        <div class="stat-info">
            <h3>UP</h3>
            <div class="stat-number">{{ up }}</div>
        </div>
    </div>

    <div class="stat-card danger">
        <div class="stat-icon"><i class="fas fa-times"></i></div>
        <div class="stat-info">
            <h3>DOWN</h3>
            <div class="stat-number">{{ down }}</div>
        </div>
    </div>
</div>

<!-- PROGRESS -->
<div class="card">
    <h3>Uptime</h3>

    <!-- SIMPAN VALUE DI DATA ATTRIBUTE -->
    <div class="progress-bar">
        <div id="progressFill" 
             class="progress-fill" 
             data-percent="{{ percent }}">
        </div>
    </div>

    <p id="progressText">{{ percent }}%</p>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const el = document.getElementById("progressFill");
    const percent = el.getAttribute("data-percent") || 0;

    el.style.width = percent + "%";
});
</script>

{% endblock %}
